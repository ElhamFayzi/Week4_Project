<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Finder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>Event Finder</h1>
        <p>Find events near you, ranked by your interests</p>
    </header>

    <main>
        <form action="/results" method="POST" class="search-form">
            <label for="interest">What are you interested in?</label>
            <input type="text" id="interest" name="interest" placeholder="e.g. rock concerts, comedy, basketball">

            <label for="location">Your location</label>
            <input type="text" id="location" name="location" placeholder="e.g. Atlanta, GA">

            <button type="submit">Find Events</button>
        </form>
    </main>
</body>
</html>
