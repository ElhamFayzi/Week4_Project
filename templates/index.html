<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Finder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>Event Whisperer</h1>
        <p>Find events near you, ranked by your interests</p>
    </header>

    <main>
        <form action="/results" method="POST" class="search-form">
            <label for="event_type">What kind of events?</label>
            <input type="text" id="event_type" name="event_type" placeholder="e.g. concerts, comedy, sports">

            <label for="location">Your location</label>
            <input type="text" id="location" name="location" placeholder="e.g. Atlanta, GA">
            <button type="button" id="use-location" class="secondary">Use my location</button>
            <input type="hidden" id="user_lat" name="user_lat">
            <input type="hidden" id="user_lon" name="user_lon">

            <label for="interest">What are you into? <small>(Used to rank events)</small></label>
            <input type="text" id="interest" name="interest" placeholder="e.g. 90s hip-hop, female vocalists, indie">

            <button type="submit">Find Events</button>
        </form>
    </main>

    <script>
        const locationInput = document.getElementById("location");
        const latInput = document.getElementById("user_lat");
        const lonInput = document.getElementById("user_lon");
        const useLocationBtn = document.getElementById("use-location");

        useLocationBtn.addEventListener("click", function () {
            if (!navigator.geolocation) {
                return;
            }

            useLocationBtn.textContent = "Locating…";
            navigator.geolocation.getCurrentPosition(
                function (position) {
                    latInput.value = position.coords.latitude;
                    lonInput.value = position.coords.longitude;
                    locationInput.value = "My current location";
                    useLocationBtn.textContent = "✓ Using my location";
                },
                function (error) {
                    alert("Couldn't get your location: " + error.message + ". Please type it instead.");
                    useLocationBtn.textContent = "Use my location";
                }
            );
        });

        locationInput.addEventListener("input", function () {
            latInput.value = "";
            lonInput.value = "";
            useLocationBtn.textContent = "Use my location";
        });
    </script>
</body>
</html>
