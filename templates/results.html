<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Results - Event Finder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>Event Finder</h1>
        <p>Results for "{{ interest }}" near {{ location }}</p>
    </header>

    <main>
        <div class="event-list">
            <div class="event-card">
                <span class="rank-badge">#1</span>
                <h2>Sample Event</h2>
                <p class="event-meta">Date - Venue - City</p>
                <p>Distance: --</p>
                <p>Weather: --</p>
            </div>

            <div class="event-card">
                <span class="rank-badge">#2</span>
                <h2>Sample Event</h2>
                <p class="event-meta">Date - Venue - City</p>
                <p>Distance: --</p>
                <p>Weather: --</p>
            </div>
        </div>

        <a href="/" class="back-link">Back to search</a>
    </main>
</body>
</html>
